    <style>
        :root {
            --accent: #00f3ff;
            --bg: #050508;
            --panel: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* CONTENEDOR DE SECCIONES (SISTEMA ANTI-AMONTONAMIENTO) */
        #main-viewport {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden; /* El scroll será interno de cada sección */
        }

        .section {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
            padding-bottom: 100px; /* Espacio para la barra */
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* BARRA DE NAVEGACIÓN POS */
        .pos-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 9999;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #444;
            flex: 1;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .nav-btn i { font-size: 1.4rem; }
        .nav-btn span { font-size: 10px; font-weight: bold; margin-top: 5px; text-transform: uppercase; }

        /* MODAL MAESTRO ÚNICO */
        #v22-modal-root {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .modal-body {
            width: 90%;
            max-width: 500px;
            background: #0d0d12;
            padding: 25px;
            border-radius: 25px;
            border: 1px solid var(--border);
        }
    </style>
</head>

<script>
  
/**
 * SISTEMA TITÁN V22 - MÓDULO DE PERSONAL PROFESIONAL
 * Reemplaza o añade este bloque en tu archivo admin2.html

window.btn_add_personal = () => {
    // Inicializar contenedor temporal de documentos
    window.V22_TEMP_DOCS = {};

    const formHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="color: var(--neon-blue); margin:0; font-size: 1.2rem; text-shadow: 0 0 10px rgba(0,243,255,0.3);">NUEVO CONDUCTOR</h2>
            <i class="fas fa-times" onclick="app.cerrarModal()" style="cursor:pointer; color: #ff4444; font-size: 1.2rem;"></i>
        </div>

        <form id="form-alta-p" onsubmit="v22_ProcesarAltaPersonal(event)" style="display: flex; flex-direction: column; gap: 10px;">
            
            <input type="text" id="p-nombre" placeholder="Nombre Completo" class="in-v22" required>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="p-rut" placeholder="RUT (Usuario)" class="in-v22" required>
                <input type="tel" id="p-tel" placeholder="Teléfono" class="in-v22" required>
            </div>
            
            <input type="text" id="p-direccion" placeholder="Dirección Particular" class="in-v22">
            
            <p style="font-size: 9px; color: var(--neon-blue); margin: 5px 0; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;">
                Documentación (Fotos Obligatorias)
            </p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <div class="v22-btn-file" onclick="v22_TriggerDoc('perfil', this)"><i class="fas fa-camera"></i><span>Perfil</span></div>
                <div class="v22-btn-file" onclick="v22_TriggerDoc('licencia', this)"><i class="fas fa-id-card"></i><span>Licencia</span></div>
                <div class="v22-btn-file" onclick="v22_TriggerDoc('antecedentes', this)"><i class="fas fa-file-contract"></i><span>Antecedentes</span></div>
                <div class="v22-btn-file" onclick="v22_TriggerDoc('hojavida', this)"><i class="fas fa-history"></i><span>Hoja Vida</span></div>
            </div>

            <button type="submit" id="btn-save-p" class="btn-main" style="width: 100%; padding: 15px; border-radius: 12px; font-size: 14px;">
                <i class="fas fa-save"></i> REGISTRAR EN TITÁN V22
            </button>
        </form>
    `;

    app.modal(formHTML);
};

// Función para disparar la cámara/archivo
window.v22_TriggerDoc = (campo, elemento) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        elemento.innerHTML = '<i class="fas fa-sync fa-spin"></i><span>...</span>';
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            // Guardamos la foto en la mochila temporal
            if (!window.V22_TEMP_DOCS) window.V22_TEMP_DOCS = {};
            window.V22_TEMP_DOCS[campo] = reader.result; 

            // Cambiamos el color para avisar que está OK
            elemento.style.borderColor = '#00f3ff';
            elemento.style.color = '#00f3ff';
            elemento.innerHTML = `<i class="fas fa-check"></i><span>${campo.toUpperCase()} OK</span>`;
        };
    };
    input.click();
};


// Lógica de guardado en Firebase V22_PRO
window.v22_ProcesarAltaPersonal = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-save-p');
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GUARDANDO...';

    const nuevoConductor = {
        nombre: document.getElementById('p-nombre').value,
        rut: document.getElementById('p-rut').value.toUpperCase(),
        telefono: document.getElementById('p-tel').value,
        direccion: document.getElementById('p-direccion').value,
        // Aquí enviamos la carpeta de fotos
        Documentos: window.V22_TEMP_DOCS || {},
        stats: {
            viajes: 0,
            estado: 'Disponible',
            fechaIngreso: new Date().toISOString()
        }
    };

    try {
        await db.ref('V22_PRO/Personal').push(nuevoConductor);
        alert("CONDUCTOR REGISTRADO EXITOSAMENTE");
        app.cerrarModal();
        // Limpiamos la mochila para el siguiente
        window.V22_TEMP_DOCS = {};
    } catch (error) {
        alert("ERROR: " + error.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> REINTENTAR';
    }
};

 
</script>

window.v22_SubirLogo = (elemento) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        try {
            const b64 = await toBase64(file);
            window.V22_TEMP_LOGO = b64;
            document.getElementById('logo-preview').innerHTML = `<img src="${b64}" style="width:100%; height:100%; object-fit:contain;">`;
            elemento.innerHTML = '<i class="fas fa-check"></i> LOGO LISTO';
            elemento.classList.add('ready');
        } catch (err) { alert("Error al cargar imagen"); }
    };
    input.click();
};

    };

<script>
/**
 * TITÁN V22 - PANEL DE CONTROL DE GUÍAS (HISTORIAL GENERAL)
 * Permite ver viajes en curso, descargar la guía y finalizar operaciones.
 */

window.v22_LogicaHistorialGeneral = async () => {
    app.modal('<div style="color:#00f3ff; text-align:center; padding:20px;">Abriendo Bitácora de Rutas...</div>');

    try {
        const snap = await db.ref('V22_PRO/Historial_General').limitToLast(50).once('value');
        const guias = snap.val() || {};

        let tablaHTML = '';
        
        // Ordenamos para que lo más nuevo salga arriba
        const registros = Object.keys(guias).reverse();

        registros.forEach(id => {
            const g = guias[id];
            const fecha = new Date(g.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const estadoColor = g.estado === 'En Ruta' ? '#00f3ff' : '#888';
            
            tablaHTML += `
                <div style="background:rgba(255,255,255,0.03); border:1px solid #222; border-radius:12px; padding:15px; margin-bottom:12px; position:relative;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px;">
                        <div>
                            <span style="color:${estadoColor}; font-size:10px; font-weight:bold; text-transform:uppercase;">● ${g.estado}</span>
                            <h4 style="color:white; margin:2px 0; font-size:14px;">${g.chofer}</h4>
                            <p style="color:#666; margin:0; font-size:11px;">Patente: <b style="color:#aaa;">${g.patente}</b></p>
                        </div>
                        <div style="text-align:right;">
                            <span style="color:#444; font-size:10px;">${fecha}</span><br>
                            <span style="color:#00f3ff; font-size:11px; font-weight:bold;">REF: ${g.cotizacion}</span>
                        </div>
                    </div>
                    
                    <div style="border-top:1px solid rgba(255,255,255,0.05); pt-10; margin-top:10px; display:flex; gap:8px;">
                        <button onclick="v22_ReimprimirGuia('${id}')" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #444; color:white; padding:8px; border-radius:6px; font-size:10px; cursor:pointer;">
                            <i class="fas fa-print"></i> REIMPRIMIR
                        </button>
                        ${g.estado === 'En Ruta' ? `
                            <button onclick="v22_FinalizarViaje('${id}')" style="flex:1; background:#00f3ff; border:none; color:black; padding:8px; border-radius:6px; font-size:10px; font-weight:bold; cursor:pointer;">
                                <i class="fas fa-check"></i> FINALIZAR
                            </button>
                        ` : `
                            <button disabled style="flex:1; background:#222; border:none; color:#555; padding:8px; border-radius:6px; font-size:10px;">
                                COMPLETADO
                            </button>
                        `}
                    </div>
                </div>
            `;
        });

        const html = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div>
                    <h2 style="color:white; margin:0; font-size:1.2rem;">CONTROL DE GUÍAS</h2>
                    <p style="color:#00f3ff; margin:0; font-size:9px;">BITÁCORA DE OPERACIONES REALES</p>

            </div>
            
            <div style="max-height:450px; overflow-y:auto; padding-right:5px;">
                ${tablaHTML || '<p style="color:#666; text-align:center; padding:40px;">No hay guías emitidas hoy.</p>'}
            </div>
        `;
        app.modal(html);

    } catch (e) {
        console.error(e);
        app.modal('<div style="color:red; padding:20px;">Error al conectar con la bitácora.</div>');
    }
};

// FUNCIÓN PARA CERRAR EL VIAJE
window.v22_FinalizarViaje = async (id) => {
    if(confirm("¿Confirmas que el vehículo ha regresado y la entrega fue exitosa?")){
        await db.ref('V22_PRO/Historial_General/' + id).update({
            estado: 'Completado',
            fecha_fin: Date.now()
        });
        v22_LogicaHistorialGeneral(); // Refrescar lista
    }

        const snap = await db.ref('V22_PRO/Cotizaciones').once('value');

        if(snap.exists()){
            snap.forEach(child => {

<script>
/**
 * TITÁN V22 - MÓDULO DE SEGURIDAD NUBE (BACKUP & RESTORE)
 */

// 1. CARGA A LA NUBE (BACKUP)
window.v22_LogicaCargaNube = async () => {
    if(!confirm("¿Deseas crear una copia de seguridad de toda la base de datos V22 en la nube?")) return;
    
    app.modal(`
        <div style="text-align:center; padding:30px;">
            <i class="fas fa-cloud-upload-alt fa-spin" style="color:var(--accent); font-size:3rem; margin-bottom:20px;"></i>
            <h2 style="color:white; font-size:1.2rem;">RESPALDANDO TITÁN V22...</h2>
            <p style="color:#666; font-size:10px;">No cierres la aplicación.</p>
        </div>
    `);

    try {
        // Leemos todo V22_PRO
        const snap = await db.ref('V22_PRO').once('value');
        const data = snap.val();

        // Guardamos en una carpeta de Backups con la fecha de hoy
        const fecha = new Date().toISOString().split('T')[0];
        await db.ref('V22_BACKUPS/' + fecha).set({
            fecha_respaldo: new Date().toLocaleString(),
            datos: data
        });

        alert("✅ Respaldo exitoso. Tus datos están seguros en la nube.");
        app.cerrarModal();
    } catch (e) {
        alert("Error al respaldar: " + e.message);
    }
};

// 2. DESCARGA DESDE LA NUBE (RESTORE)
window.v22_LogicaDescargaNube = async () => {
    const clave = prompt("Introduce la clave de seguridad para restaurar datos:");
    if(clave !== "TITAN2026") return alert("Acceso denegado."); // Seguridad básica

    app.modal(`
        <div style="text-align:center; padding:30px;">
            <i class="fas fa-cloud-download-alt" style="color:#00ff64; font-size:3rem; margin-bottom:20px;"></i>
            <h2 style="color:white; font-size:1.2rem;">RESTAURACIÓN DE DATOS</h2>
            <p style="color:#666; font-size:11px; margin-bottom:20px;">Selecciona un punto de restauración:</p>
            <div id="v22_render_backups" style="max-height:200px; overflow-y:auto;"></div>
            <button onclick="app.cerrarModal()" style="margin-top:20px; background:none; border:1px solid #444; color:#888; padding:8px 20px; border-radius:8px;">CANCELAR</button>
        </div>
    `);

    try {
        const snap = await db.ref('V22_BACKUPS').limitToLast(5).once('value');
        const div = document.getElementById('v22_render_backups');
        
        if(!snap.exists()){
            div.innerHTML = "<p style='color:#444;'>No hay backups disponibles.</p>";
            return;
        }

        let html = "";
        snap.forEach(child => {
            html += `
                <div onclick="v22_EjecutarRestauracion('${child.key}')" style="background:rgba(255,255,255,0.05); border:1px solid #333; padding:10px; border-radius:10px; margin-bottom:8px; cursor:pointer; color:white; font-size:12px;">
                    <i class="fas fa-history" style="color:#00ff64;"></i> ${child.val().fecha_respaldo}
                </div>
            `;
        });
        div.innerHTML = html;
    } catch (e) { alert(e.message); }
};

// Función interna de restauración
window.v22_EjecutarRestauracion = async (key) => {
    if(!confirm("⚠️ ATENCIÓN: Esto sobrescribirá todos los datos actuales por los del backup. ¿Continuar?")) return;
    
    try {
        const snap = await db.ref('V22_BACKUPS/' + key + '/datos').once('value');
        await db.ref('V22_PRO').set(snap.val());
        alert("🔄 Datos restaurados correctamente. La aplicación se reiniciará.");
        location.reload();
    } catch (e) { alert(e.message); }
};
</script>

window.v22_ImportarBaseLocal = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json'; // IMPORTANTE: Formato JSON
    
    input.onchange = ev => {
        const file = ev.target.files[0];
        const reader = new FileReader();
        
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                // Validamos que sea un archivo de Titán (buscando ramas conocidas)
                if (data.Cotizaciones || data.Historial_General || data.Personal) {
                    if (confirm("Se detectó una base de datos válida. ¿Deseas inyectarla a la Nube? Esto actualizará los registros actuales.")) {
                        await db.ref('V22_PRO').update(data);
                        alert("✅ Sincronización exitosa. El sistema se reiniciará.");
                        location.reload();
                    }
                } else {
                    alert("❌ El archivo .json no parece ser un respaldo compatible con TITÁN V22.");
                }
            } catch (err) {
                alert("❌ Error al leer el archivo. Asegúrate de que sea un .json válido.");
            }
        };
        reader.readAsText(file);
    };
    input.click();
};

// Función para crear el Slot de documento exactamente como el tuyo
function v22_SlotDoc(label, icono, valor, rama, id, campo) {
    const activeColor = valor ? 'var(--accent)' : '#333';
    const glow = valor ? `box-shadow: inset 0 0 10px rgba(0,243,255,0.1); border-color: var(--accent);` : `border-color: #222;`;
    
    return `
        <div onclick="v22_DispararCarga('${rama}', '${id}', '${campo}')" 
            style="height:80px; background:rgba(255,255,255,0.02); border:1px solid; ${glow} border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition: 0.3s;">
            <i class="fas ${icono}" style="color:${activeColor}; font-size:1.4rem; margin-bottom:5px;"></i>
            <span style="font-size:8px; color:#666; text-transform:uppercase;">${label} ${valor ? '✅' : ''}</span>
        </div>`;
}

window.v22_DispararCarga = (rama, id, campo) => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = async ev => {
            await db.ref(`V22_PRO/${rama}/${id}`).update({ [campo]: ev.target.result });
            alert("Imagen cargada con éxito.");
            v22_AbrirEditorCompleto(rama, id); // Refrescar para ver el cambio
        };
        reader.readAsDataURL(file);
    };
    input.click();
};

window.v22_GuardarCambiosFinal = async (rama, id) => {
    const updates = {};
    const inputs = document.querySelectorAll(`[id^="edit_"]`);
    inputs.forEach(i => {
        const key = i.id.replace('edit_', '');
        updates[key] = i.value;
    });
    
    await db.ref(`V22_PRO/${rama}/${id}`).update(updates);
    alert("✅ Datos actualizados en la base de datos.");
    v22_Gestionar(rama);
};
</script>
<script>

 * TITÁN V22 - INYECTOR DE VIGILANCIA ACTIVA
 * Este script escanea la pantalla para activar los botones de Settings.
 */

(function v22_VigilanteSettings() {
    const activar = () => {
        // Buscamos todas las cards de acción
        const cards = document.querySelectorAll('.action-card');
        
        cards.forEach(card => {
            const txt = card.innerText.toUpperCase();
            if (card.dataset.v22_ready) return; // Si ya está activo, saltar

            if (txt.includes('EDITAR PERSONAL')) {
                card.onclick = (e) => { e.preventDefault(); v22_Gestionar('Personal'); };
                card.dataset.v22_ready = "true";
                card.style.borderLeft = "4px solid var(--accent)"; // Marca visual de activación
            }
            
            if (txt.includes('EDITAR FLOTA')) {
                card.onclick = (e) => { e.preventDefault(); v22_Gestionar('Flota'); };
                card.dataset.v22_ready = "true";
                card.style.borderLeft = "4px solid #00f3ff";
            }
        });
    };

    // Escaneo constante cada 600ms para detectar cambios de vista
    setInterval(activar, 600);
})();

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                ${v22_SlotDoc('Padrón', 'fa-file-contract', d.fotoPadron, rama, id, 'fotoPadron')}
                ${v22_SlotDoc('Rev. Técnica', 'fa-tools', d.fotoTecnica, rama, id, 'fotoTecnica')}
                ${v22_SlotDoc('Seguro', 'fa-shield-halved', d.fotoSeguro, rama, id, 'fotoSeguro')}
                ${v22_SlotDoc('Permiso', 'fa-calendar-check', d.fotoPermiso, rama, id, 'fotoPermiso')}
            </div>`;
    }

    app.modal(`
        <div style="position:relative;">

            ${formHTML}
            <button onclick="v22_Guardar('${rama}', '${id}')" style="width:100%; background:var(--accent); color:black; border:none; padding:15px; border-radius:12px; font-weight:900; margin-bottom:10px;">GUARDAR CAMBIOS</button>
            <button onclick="v22_Gestionar('${rama}')" style="width:100%; background:transparent; border:1px solid #444; color:#666; padding:10px; border-radius:10px; font-size:11px;">CANCELAR</button>
        </div>

};

function v22_SlotDoc(label, icono, valor, rama, id, campo) {
    const colorIcon = valor ? 'var(--accent)' : '#444';
    return `<div onclick="v22_CargarFoto('${rama}','${id}','${campo}')" style="height:70px; background:rgba(255,255,255,0.02); border:1px ${valor?'solid':'dashed'} ${valor?'var(--accent)':'#333'}; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;">
        <i class="fas ${icono}" style="color:${colorIcon}; font-size:1.2rem; margin-bottom:4px;"></i>
        <span style="font-size:7px; color:#666;">${label.toUpperCase()}</span>
    </div>`;
}

window.v22_CargarFoto = (rama, id, campo) => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = async ev => {
            await db.ref(`V22_PRO/${rama}/${id}`).update({ [campo]: ev.target.result });
            alert("Imagen lista. Guarde para confirmar.");
            v22_AbrirEditorCompleto(rama, id);
        };
        reader.readAsDataURL(e.target.files[0]);
    };
    input.click();
};

window.v22_Guardar = async (rama, id) => {
    const upd = {};
    document.querySelectorAll('[id^="edit_"]').forEach(i => upd[i.id.replace('edit_', '')] = i.value);
    await db.ref(`V22_PRO/${rama}/${id}`).update(upd);
    alert("✅ Cambios aplicados.");
    v22_Gestionar(rama);
};
</script>

<script>
(function v22_MonitorSuperior() {
    console.log("TITÁN V22: Monitor V12 (Superior) Activo...");

    // 1. CAPTURADOR DE EVENTOS (Mantiene la lógica de Firebase)
    document.addEventListener('click', function(e) {
        if (e.target && e.target.innerText === 'GENERAR GUÍA DE DESPACHO') {
            window.v22_temp_data = {
                f: document.getElementById('asig-real-doc')?.value,
                c: document.getElementById('asig-real-chofer')?.value,
                p: document.getElementById('asig-real-flota')?.value,
                o: document.getElementById('asig-real-obs')?.value
            };
        }

        if (e.target && e.target.innerText === 'EMITIR Y DESCARGAR') {
            const data = window.v22_temp_data;
            if (data && data.p) {
                db.ref('V22_PRO/Flota').once('value', snap => {
                    snap.forEach(child => {
                        if (child.val().patente === data.p) {
                            db.ref(`V22_PRO/Flota/${child.key}`).update({
                                estado: 'EN RUTA',
                                choferActual: data.c,
                                guiaActual: data.f,
                                notas: data.o || 'Sin registro',
                                fecha: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
                            });
                        }
                    });
                });
                app.toast("Unidad en Ruta");
            }
        }
    }, true);

    // 2. ESTILOS REFORMADOS (POSICIÓN SUPERIOR)
    if(!document.getElementById('v22-v12-css')){
        const s = document.createElement('style');
        s.id = 'v22-v12-css';
        s.innerHTML = `
            #v22-monitor-v12 {
                position: fixed; 
                top: 0; left: 0; width: 100%; 
                background: #0a0f19; 
                border-bottom: 2px solid #d4af37;
                border-radius: 0 0 20px 20px; 
                z-index: 999999; 
                height: 50px; 
                overflow: hidden; 
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            }
            #v22-monitor-v12.expand { height: 180px; }
            
            .v12-bar {

            .v12-bar i.fa-chevron-up { transform: rotate(180deg); transition: 0.3s; }

            }
            .v12-card.ruta { border-color: #00f3ff; box-shadow: inset 0 0 10px rgba(0,243,255,0.1); }
        `;
        document.head.appendChild(s);
    }

    // 3. RENDERIZADO Y FICHAS
    const render = () => {
        const grid = document.getElementById('v12-grid-list');
        if(!grid) return;

        db.ref('V22_PRO/Flota').on('value', snap => {
            grid.innerHTML = '';
            snap.forEach(child => {
                const v = child.val();
                const ocupado = v.estado === 'EN RUTA';
                const card = document.createElement('div');
                card.className = `v12-card ${ocupado ? 'ruta' : ''}`;
                card.innerHTML = `
                    <div style="font-size:10px; font-weight:bold; color:#fff;">${v.patente}</div>
                    <div style="height:2px; background:${ocupado ? '#00f3ff':'#00ff64'}; margin:6px 0;"></div>
                    <div style="font-size:8px; color:${ocupado ? '#00f3ff':'#00ff64'}; font-weight:900;">${v.estado || 'LIBRE'}</div>
                `;
                card.onclick = (e) => { e.stopPropagation(); v22_FichaV12(v, child.key); };
                grid.appendChild(card);
            });
        });
    };

    window.v22_FichaV12 = (v, key) => {
        const esRuta = v.estado === 'EN RUTA';
        app.modal(`
            <div style="padding:20px; color:#000; text-align:left;">
                <h2 style="color:#d4af37; text-align:center;">${v.patente}</h2>
                <div style="background:#f4f4f4; padding:15px; border-radius:10px; margin:15px 0; font-size:13px;">

                    <p><b>DOCUMENTO:</b> <span style="float:right;">#${v.guiaActual || '---'}</span></p>
                    <p><b>HORA:</b> <span style="float:right;">${v.fecha || '---'}</span></p>
                    <hr>
                    <p><b>OBS:</b> <br><small>${v.notas || 'Sin registro'}</small></p>
                </div>
                <div style="display:flex; gap:10px;">
                    <button onclick="app.cerrarModal()" style="flex:1; padding:12px; border:none; background:#ccc; border-radius:8px;">VOLVER</button>
                    ${esRuta ? `<button onclick="v22_LibV12('${key}')" style="flex:1; padding:12px; border:none; background:#ff4444; color:#fff; border-radius:8px;">LIBERAR</button>`:''}
                </div>
            </div>
        `);
    };

    window.v22_LibV12 = (k) => {
        db.ref(`V22_PRO/Flota/${k}`).update({ estado: 'LIBRE', choferActual: '', guiaActual: '', notas: '', fecha: '' });
        app.cerrarModal();
    };

    // 4. INYECCIÓN
    if(!document.getElementById('v22-monitor-v12')){
        const m = document.createElement('div');
        m.id = 'v22-monitor-v12';
        m.innerHTML = `
            <div class="v12-bar" onclick="this.parentElement.classList.toggle('expand')">

                <i class="fas fa-chevron-up"></i>
            </div>
            <div id="v12-grid-list" class="v12-grid"></div>
        `;
        document.body.appendChild(m);
        render();
    }
})();
</script>

                        </div>
                    </div>`;
            });
            html += `</div></div>`;
            app.modal(html);
        });
    };

    // 6. INTERCEPTOR
    document.addEventListener('click', function(e) {
        if(document.body.innerText.includes('CONDUCTORES')) {
            let el = e.target.closest('div, button, p');
            if(el && el.innerText.length > 2 && el.innerText.length < 50) {
                const txt = el.innerText.split('\n')[0].trim();
                if(txt !== "CONDUCTORES" && txt !== "DISPONIBLE" && !txt.includes('666')) {
                    e.preventDefault(); e.stopPropagation(); window.v22_MostrarMenuOpciones(txt);

            }
        }
    }, true);
})();

</script>

            doc.setFont("helvetica", "bold");

        };

        if(file) {
            const reader = new FileReader();
            reader.onload = (e) => enviar(e.target.result);
            reader.readAsDataURL(file);
        } else { enviar(); }
    };

    // 5. CARPETA DE HISTORIAL CON BOTÓN REGRESAR
    window.v22_VerFaltas = (nombre) => {

})();

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Estética TITÁN V22 Premium
            doc.setFillColor(20, 20, 20);
            doc.rect(0, 0, 210, 40, 'F');
            doc.setFillColor(CIAN);
            doc.rect(0, 38, 210, 2, 'F');

            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22); doc.setFont("helvetica", "bold");

            doc.setTextColor(40, 40, 40);

            doc.text(`OPERADOR: ${n.toUpperCase()}`, 20, 60);
            doc.text(`FECHA DE REGISTRO: ${fe}`, 20, 70);
            
            doc.setFont("helvetica", "bold");
            doc.text("ASUNTO / MOTIVO:", 20, 90);
            doc.setFont("helvetica", "normal");
            doc.text(mot.toUpperCase(), 20, 100);

            doc.text("CONTENIDO DEL REGISTRO:", 20, 120);
            doc.setFont("helvetica", "normal");

                doc.text("RESPALDO VISUAL ADJUNTO", 20, 15);
                doc.addImage(img, 'JPEG', 10, 25, 190, 150);

        // Evitar duplicados
        if (document.getElementById('v22_card_total')) return;

        const card = document.createElement('div');
        card.id = 'v22_card_total';
        card.style = `

            <div id="v22_num_real" style="font-size: 50px; font-weight: 800; color: #fff; margin: 5px 0;">--</div>

        `;

        // Se pone al principio del contenedor de personal
        contenedor.prepend(card);
        
        // Conexión a Firebase
        db.ref('V22_PRO/Personal').on('value', (snap) => {
            const display = document.getElementById('v22_num_real');

        });
    };

    /**
     * 3. EL "GANCHO" MÁGICO:

    const originalAppIr = app.ir;
    app.ir = function(id, el) {
        // Llamamos a la función original para que cambie de pestaña normalmente
        originalAppIr(id, el);

        if (id === 'sec-personal') {

<script>
(() => {
    const CIAN = "#00f3ff";

        const container = document.getElementById('v22_chat_msg_container');
        const input = document.getElementById('v22_chat_input');
        const btn = document.getElementById('v22_chat_send');
        const dot = document.getElementById('v22_alert_dot');

        const enviarMsg = () => {
            const texto = input.value.trim();
            if (!texto) return;
            db.ref('V22_PRO/Chat_Operativo').push({
                user: "ADMIN",
                msg: texto,
                time: new Date().getTime(),
                tipo: "admin"
            });
            input.value = "";
        };

        btn.onclick = enviarMsg;
        input.onkeypress = (e) => { if(e.key === 'Enter') enviarMsg(); };

        // --- LÓGICA DE ALERTAS Y TIEMPO REAL ---
        let primerCarga = true;

        db.ref('V22_PRO/Chat_Operativo').limitToLast(25).on('value', (snap) => {

                ultimoEsAdmin = (m.tipo === "admin");

                    ">
                        ${m.msg}
                    </div>
                `;
                container.appendChild(msgDiv);
            });

            // Acción al recibir mensaje nuevo
            if (!primerCarga && !ultimoEsAdmin) {
                // 1. Sonido
                audioNotif.play().catch(e => console.log("Audio bloqueado por navegador"));

                dot.style.display = "block";
                // 3. Quitar alerta visual al mover el scroll

            container.scrollTop = container.scrollHeight;
            primerCarga = false;
        });
    };

    setInterval(() => {
        if (document.getElementById('sec-personal')?.style.display !== 'none') v22_inyectar_chat_pro();

})();

            const rect = radarBox.getBoundingClientRect();
            if (rect.top > window.innerHeight / 2) {
                lista.classList.replace('v22-abajo', 'v22-arriba');
            } else {
                lista.classList.replace('v22-arriba', 'v22-abajo');
            }
            lista.classList.toggle('abierto');
        });

        // Carga de conductores (Solo si el radar está activo)
        db.ref('V22_PRO/Personal').on('value', (snap) => {
            if (!document.getElementById('v22_radar_items')) return;
            items.innerHTML = "";
            snap.forEach(child => {
                const nombre = child.val().nombre;
                const row = document.createElement('div');
                row.className = "v22-item-radar";
                row.innerHTML = `<i class="fas fa-user-tag" style="margin-right:8px; color:${CIAN}"></i> ${nombre}`;

                    e.stopPropagation();

                        const gps = uSnap.val();
                        if (gps && gps.lat && gps.lng && typeof mapV22 !== 'undefined') {
                            mapV22.flyTo([gps.lat, gps.lng], 17, { animate: true, duration: 1.5 });
                            if (markersV22[nombre]) markersV22[nombre].openPopup();
                            lista.classList.remove('abierto');
                        }
                    });
                };
                items.appendChild(row);
            });
        });
    };

    // Este vigilante ahora solo asegura que el botón exista DENTRO de la sección cuando se activa
    setInterval(() => {
        const sec = document.getElementById('sec-flota');
        if (sec && sec.style.display !== 'none') {
            v22_inicializar_radar_flota();
        }
    }, 1000);
})();

<script>
/**
 * TITÁN V22 - VERSIÓN RECUPERACIÓN
 * Botón al inicio + Silueta + PDF
 */

const v22_Recuperador = new MutationObserver(() => {
    // Buscamos las tarjetas de personal
    const tarjetas = document.querySelectorAll('.v22-card-personal, .v22-list-item');
    
    tarjetas.forEach(card => {
        // Buscamos dónde está el nombre (strong o span)
        const contenedorNombre = card.querySelector('strong') || card.querySelector('span') || card;
        
        if (contenedorNombre && !card.querySelector('.v22-btn-final')) {
            
            const btn = document.createElement('div');
            btn.className = 'v22-btn-final';
            // Diseño de silueta elegante
            btn.innerHTML = `<i class="fas fa-user-tie"></i>`;
            btn.style.cssText = `
                display: inline-flex; align-items: center; justify-content: center;
                width: 32px; height: 32px; background: #00f3ff;
                border-radius: 8px; color: #000; margin-right: 10px;
                cursor: pointer; box-shadow: 0 0 10px #00f3ff;
                flex-shrink: 0;
            `;

            const textoOriginal = contenedorNombre.innerText;
            const nombreLimpio = textoOriginal.replace('🚚', '').trim();

            btn.onclick = (e) => {
                e.preventDefault(); e.stopPropagation();
                v22_AbrirExpediente(nombreLimpio);
            };

            // Inyectamos el botón JUSTO ANTES del nombre
            contenedorNombre.style.display = 'flex';
            contenedorNombre.style.alignItems = 'center';
            contenedorNombre.prepend(btn);
        }
    });
});

v22_Recuperador.observe(document.body, { childList: true, subtree: true });

async function v22_AbrirExpediente(nom) {
    db.ref('V22_PRO/Personal').once('value', snap => {
        let driver = null;
        snap.forEach(c => {
            let d = c.val();
            if (nom.toLowerCase().includes(d.nombre.toLowerCase().trim())) driver = d;
        });

        if (!driver) return alert("No se encontraron datos de: " + nom);

        const docs = driver.Documentos || driver.documentos || {};
        const getF = (k) => {
            const key = Object.keys(docs).find(x => x.toLowerCase().includes(k.toLowerCase()));
            return key ? docs[key] : null;
        };

        const fotosArr = [
            { t: "PERFIL", src: getF('perfil') },
            { t: "LICENCIA", src: getF('licencia') },
            { t: "ANTECEDENTES", src: getF('antecedentes') },
            { t: "HOJA VIDA", src: getF('hoja') }
        ];

        const html = `
            <div style="background:#000; border:2px solid #00f3ff; border-radius:20px; padding:20px;">
                <h2 style="color:#00f3ff; font-size:14px; text-align:center; margin-bottom:15px;">${driver.nombre}</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                    ${fotosArr.map(f => `
                        <div style="background:#080808; border:1px solid #222; border-radius:10px; padding:5px; text-align:center;">
                            <p style="font-size:7px; color:#00f3ff;">${f.t}</p>
                            <img src="${f.src || ''}" style="width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:5px; background:#000;">
                        </div>
                    `).join('')}
                </div>
                <button onclick="v22_DescargarPDF('${driver.nombre}', ${JSON.stringify(fotosArr).replace(/"/g, '&quot;')})" 
                        style="width:100%; padding:12px; background:#00f3ff; color:#000; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">
                    DESCARGAR PDF
                </button>
                <p onclick="app.cerrarModal()" style="color:red; text-align:center; margin-top:15px; cursor:pointer; font-size:12px;">CERRAR</p>
            </div>
        `;
        app.modal(html);
    });
}

function v22_DescargarPDF(nombre, lista) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let hasImgs = false;
    const ahora = new Date().toLocaleString();

    lista.forEach((f, i) => {
        if (f.src && f.src.length > 100) {
            if (hasImgs) doc.addPage();
            
            // --- DISEÑO CORPORATIVO ---
            // 1. Encabezado Azul Titán
            doc.setFillColor(0, 243, 255);
            doc.rect(0, 0, 210, 25, 'F');
            
            // 2. Nombre de la Empresa y Título
            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.setTextColor(0, 0, 0);
            doc.text("TITÁN V22 | EXPEDIENTE OFICIAL", 15, 12);
            
            doc.setFontSize(10);
            doc.text(`REGISTRO DE PERSONAL - CALAMA, CHILE`, 15, 18);

            // 3. Info del Trabajador y Fecha (Lado derecho)
            doc.setFontSize(9);
            doc.text(`TRABAJADOR: ${nombre.toUpperCase()}`, 110, 22);
            doc.text(`FECHA EMISIÓN: ${ahora}`, 110, 18);

            // 4. Título del Documento Actual
            doc.setFontSize(14);
            doc.setTextColor(40, 40, 40);
            doc.text(`DOCUMENTO: ${f.t}`, 105, 35, { align: "center" });

            // 5. Marco para la Foto
            doc.setDrawColor(0, 243, 255);
            doc.setLineWidth(1);
            doc.rect(14, 39, 182, 182); // Marco externo
            
            // 6. La Imagen
            try {
                doc.addImage(f.src, 'JPEG', 15, 40, 180, 180);
            } catch (e) {
                doc.text("ERROR: No se pudo renderizar la imagen", 105, 100, { align: "center" });
            }

            // 7. Pie de Página Corporativo
            doc.setDrawColor(200, 200, 200);
            doc.line(20, 250, 90, 250); // Línea Firma 1
            doc.line(120, 250, 190, 250); // Línea Firma 2
            
            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);
            doc.text("FIRMA TRABAJADOR", 55, 255, { align: "center" });
            doc.text("TIMBRE Y FIRMA EMPRESA", 155, 255, { align: "center" });

            doc.setFontSize(7);
            doc.text("Documento generado automáticamente por el Sistema de Gestión TITÁN V22. Los datos adjuntos son confidenciales.", 105, 285, { align: "center" });
            doc.text(`Página ${i + 1} de ${lista.filter(x=>x.src).length}`, 200, 290, { align: "right" });

            hasImgs = true;
        }
    });

    if (!hasImgs) return alert("El expediente no contiene imágenes para exportar.");
    
    // Guardamos con nombre formal
    const nombreArchivo = `EXPEDIENTE_${nombre.replace(/ /g, '_')}_${ahora.split(',')[0].replace(/\//g, '-')}.pdf`;
    doc.save(nombreArchivo);
}

            .then(reg => console.log('Titán V22: Service Worker registrado con éxito', reg))
            .catch(err => console.error('Error al registrar Service Worker', err));
    });
}

</script>
